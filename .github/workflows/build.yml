name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/docker-compose.yaml'
      - '**/docker-compose.yml'
      - '**/docker-compose.*.yaml'
      - '**/docker-compose.*.yml'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.changed.outputs.folders }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - id: changed
        run: |
          folders=$(git diff --name-only HEAD~1 HEAD | cut -d/ -f1 | sort -u | while read dir; do
            [ -f "$dir/Dockerfile" ] && echo "$dir"
          done | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "folders=$folders" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.folders != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: ${{ fromJson(needs.detect.outputs.folders) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          TAG=$(cat "${{ matrix.folder }}/version")
          IMAGE="ghcr.io/quick-sort/${{ matrix.folder }}:${TAG}"

          # Delete existing image with same tag to keep only one history
          docker manifest rm "$IMAGE" 2>/dev/null || true

          docker build -t "$IMAGE" "${{ matrix.folder }}"
          docker push "$IMAGE"
